<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalorieTracker — История</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>

<body>

    <header class="topnav">
        <a href="index.html" class="nav-logo">
            <span>🥗</span> CalorieTracker
        </a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="dashboard.html" class="nav-link">Дневник</a>
            <a href="history.html" class="nav-link active">История</a>
            <a href="settings.html" class="nav-link">Настройки</a>
        </nav>
        <button id="theme-toggle-btn" class="theme-toggle-btn">🌙</button>
    </header>

    <div class="page-layout-2col">

        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Фильтры</div>

                <div class="form-group">
                    <label class="form-label">Быстрый выбор</label>
                    <div class="period-tabs">
                        <button class="period-tab" data-period="7">Неделя</button>
                        <button class="period-tab active" data-period="30">Месяц</button>
                        <button class="period-tab" data-period="90">3 мес.</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">С</label>
                    <input class="form-input" type="date" id="date-from">
                </div>

                <div class="form-group">
                    <label class="form-label">По</label>
                    <input class="form-input" type="date" id="date-to">
                </div>

                <button class="btn-green" id="apply-filter-btn">Применить</button>
            </div>

            <div class="sidebar-section" id="summary-section" style="display:none">
                <div class="sidebar-title">Итог периода</div>
                <div class="summary-item">
                    <div class="form-label">Ср. калории</div>
                    <div class="summary-value" id="sum-avg-cal">— <span class="summary-small">ккал/день</span></div>
                </div>
                <div class="summary-item">
                    <div class="form-label">Дней в норме</div>
                    <div class="summary-value summary-value-green" id="sum-norm-days">—</div>
                </div>
                <div class="summary-item">
                    <div class="form-label">Всего дней</div>
                    <div class="summary-value" id="sum-total-days">—</div>
                </div>
            </div>
        </aside>

        <main>
            <div class="main-card">
                <div class="main-card-header">
                    <div class="main-card-title">История питания</div>
                    <div class="main-card-date" id="history-range">—</div>
                </div>
                <div id="history-list">
                    <div style="padding:40px 20px; text-align:center; color:#888;">Загрузка...</div>
                </div>
            </div>
        </main>
    </div>

    <nav class="mobile-nav">
        <div class="mobile-nav-inner">
            <a href="index.html" class="mob-btn"><span class="mob-btn-icon">🏠</span>Главная</a>
            <a href="dashboard.html" class="mob-btn"><span class="mob-btn-icon">📒</span>Дневник</a>
            <a href="history.html" class="mob-btn active"><span class="mob-btn-icon">📅</span>История</a>
            <a href="settings.html" class="mob-btn"><span class="mob-btn-icon">⚙️</span>Настройки</a>
        </div>
    </nav>

    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
